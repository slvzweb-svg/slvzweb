<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Litz — Entrar</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #121212;
            --card-bg: rgba(30, 30, 30, 0.7);
            --text-main: #EAEAEA;
            --text-dim: #A0A0A0;
            --primary-green: #3DDC97;
            --accent-purple: #7B2CBF;
            --accent-purple-hover: #9D4EDD;
            --error-red: #FF4D4D;
            --border-color: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        .blur-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 1;
            filter: blur(100px);
            opacity: 0.4;
            background: radial-gradient(circle at 80% 20%, #7B2CBF 0%, transparent 40%), 
                        radial-gradient(circle at 20% 80%, #3DDC97 0%, transparent 40%);
        }

        .auth-container {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 400px;
            padding: 40px;
            background: var(--card-bg);
            backdrop-filter: blur(25px);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            text-align: center;
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .auth-header h1 { font-size: 1.6rem; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 8px; }
        .auth-header p { font-size: 0.85rem; color: var(--text-dim); margin-bottom: 30px; }

        .input-group { text-align: left; margin-bottom: 20px; }
        .input-group label { display: block; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; color: var(--text-dim); }
        
        .input-group input {
            width: 100%;
            padding: 14px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-main);
            font-size: 0.95rem;
            transition: 0.3s;
        }

        .input-group input:focus { border-color: var(--accent-purple); background: rgba(255, 255, 255, 0.07); }

        .forgot-pass {
            display: block;
            text-align: right;
            font-size: 0.75rem;
            color: var(--text-dim);
            margin-top: -10px;
            margin-bottom: 25px;
            text-decoration: none;
            transition: 0.2s;
        }

        .forgot-pass:hover { color: var(--accent-purple); }

        .btn-auth {
            width: 100%;
            padding: 16px;
            background: var(--accent-purple);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-auth:hover { background: var(--accent-purple-hover); transform: translateY(-2px); box-shadow: 0 5px 15px rgba(123, 44, 191, 0.3); }

        /* TOAST */
        .toast {
            position: fixed;
            top: 20px;
            right: -320px;
            padding: 15px 25px;
            border-radius: 8px;
            z-index: 1000;
            transition: 0.5s cubic-bezier(0.68, -0.55, 0.26, 1.55);
            font-size: 0.9rem;
            font-weight: 600;
        }
        .toast.show { right: 20px; }
        .toast.error { background: var(--error-red); color: white; }
        .toast.success { background: var(--primary-green); color: #121212; }

        .copyright { position: absolute; bottom: 20px; font-size: 0.6rem; letter-spacing: 1px; color: #444; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="blur-bg"></div>
    <div id="toast" class="toast"></div>

    <div class="auth-container">
        <div class="auth-header">
            <h1>Entrar</h1>
            <p>Continue sua leitura no Litz</p>
        </div>

        <form id="loginForm">
            <div class="input-group">
                <label>E-mail</label>
                <input type="email" id="email" required placeholder="seu@email.com">
            </div>

            <div class="input-group">
                <label>Senha</label>
                <input type="password" id="password" required placeholder="Sua senha secreta">
            </div>

            <a href="#" onclick="recuperarSenha()" class="forgot-pass">Esqueceu a senha?</a>

            <button type="submit" id="btnLogin" class="btn-auth">Entrar</button>
        </form>

        <div style="margin-top: 25px; font-size: 0.8rem; color: var(--text-dim);">
            Ainda não tem conta? <a href="cadastro.html" style="color: var(--primary-green); text-decoration: none; font-weight: 600;">Criar agora</a>
        </div>
    </div>

    <div class="copyright">© 2026 LITZ — TODOS OS DIREITOS RESERVADOS.</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // Substitua pelas suas credenciais
        const firebaseConfig = {
            apiKey: "AIzaSyAt_l4DcDiXrCRzDkOtu8PeWoIwMk9Mj38",
            authDomain: "litz-orignals.firebaseapp.com",
            projectId: "litz-orignals",
            storageBucket: "litz-orignals.firebasestorage.app",
            messagingSenderId: "286693298991",
            appId: "1:286693298991:web:a139c4637b86a4725a87da"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        const loginForm = document.getElementById('loginForm');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('btnLogin');

            btn.disabled = true;
            btn.innerText = "Verificando...";

            try {
                await signInWithEmailAndPassword(auth, email, password);
                showToast("Login realizado! Redirecionando...", "success");
                setTimeout(() => window.location.href = "home.html", 1500);
            } catch (error) {
                console.error(error);
                let msg = "E-mail ou senha incorretos.";
                if(error.code === 'auth/user-not-found') msg = "Usuário não encontrado.";
                showToast(msg, "error");
                btn.disabled = false;
                btn.innerText = "Entrar";
            }
        });

        // Função Global para Recuperação
        window.recuperarSenha = async () => {
            const email = document.getElementById('email').value;
            if(!email) {
                showToast("Digite seu e-mail acima primeiro.", "error");
                return;
            }
            try {
                await sendPasswordResetEmail(auth, email);
                showToast("E-mail de recuperação enviado!", "success");
            } catch (error) {
                showToast("Erro ao enviar e-mail.", "error");
            }
        };

        function showToast(text, type) {
            const toast = document.getElementById('toast');
            toast.innerText = text;
            toast.className = `toast show ${type}`;
            setTimeout(() => toast.className = 'toast', 3000);
        }
    </script>
</body>
</html>
