<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Litz — Leitor</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Merriweather:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0a;
            --text: #e0e0e0;
            --accent: #3DDC97;
            --panel: #1a1a1a;
            --font-size: 1.1rem;
            --font-family: 'Inter', sans-serif;
            --line-height: 1.8;
            --border: rgba(255, 255, 255, 0.1);
        }

        body.sepia { --bg: #f4ecd8; --text: #5b4636; --panel: #e8dfc8; --border: rgba(0, 0, 0, 0.1); }
        body.light { --bg: #ffffff; --text: #1a1a1a; --panel: #f0f0f0; --border: rgba(0, 0, 0, 0.1); }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: var(--bg); 
            color: var(--text); 
            transition: background 0.3s, color 0.3s;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* --- HEADER --- */
        .reader-header {
            position: fixed; top: 0; width: 100%; height: 60px;
            background: var(--panel); display: flex; align-items: center;
            justify-content: space-between; padding: 0 5%; z-index: 100;
            border-bottom: 1px solid var(--border);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .reader-header.hide { transform: translateY(-100%); }

        .btn-icon { background: none; border: none; color: var(--text); cursor: pointer; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
        .chapter-title { font-size: 0.75rem; font-weight: 700; text-align: center; flex: 1; opacity: 0.8; letter-spacing: 1.5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding: 0 10px; }

        /* --- CONTEÚDO --- */
        #content-area {
            max-width: 700px; margin: 100px auto 60px;
            padding: 0 25px;
            font-family: var(--font-family);
            font-size: var(--font-size);
            line-height: var(--line-height);
        }
        #content-area p { margin-bottom: 2rem; text-align: justify; }

        /* --- PROGRESSO --- */
        .progress-container {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 4px;
            background: rgba(255,255,255,0.05); z-index: 101;
        }
        .progress-bar { height: 100%; background: var(--accent); width: 0%; transition: width 0.1s; }

        /* --- PAINEL DE AJUSTES --- */
        .settings-panel {
            position: fixed; bottom: 85px; right: 20px;
            background: var(--panel); border: 1px solid var(--border);
            border-radius: 12px; padding: 20px; display: none; 
            flex-direction: column; gap: 15px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6); z-index: 100;
            min-width: 200px;
        }
        .settings-panel.active { display: flex; animation: slideUp 0.3s ease; }

        @keyframes slideUp { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .chapter-nav {
            max-width: 700px; margin: 60px auto 120px;
            display: flex; gap: 20px; padding: 0 25px;
        }
        .nav-btn {
            flex: 1; background: var(--panel); color: var(--text); border: 1px solid var(--border);
            padding: 18px; border-radius: 8px; cursor: pointer; font-weight: 800; font-size: 0.7rem;
            text-transform: uppercase; transition: 0.3s; letter-spacing: 1px;
        }
        .nav-btn:hover:not(:disabled) { border-color: var(--accent); background: #222; }
        .nav-btn:disabled { opacity: 0.2; cursor: not-allowed; }

        @media (max-width: 600px) {
            #content-area { font-size: 1.1rem; }
            .reader-header { padding: 0 15px; }
        }
    </style>
</head>
<body class="dark">

    <header class="reader-header" id="header">
        <button class="btn-icon" onclick="history.back()">Sair</button>
        <div class="chapter-title" id="displayTitle">CARREGANDO...</div>
        <button class="btn-icon" onclick="toggleSettings()">Ajustes</button>
    </header>

    <div class="progress-container">
        <div class="progress-bar" id="progressBar"></div>
    </div>

    <main id="content-area">
        </main>

    <nav class="chapter-nav">
        <button class="nav-btn" id="prevBtn" onclick="mudarCapitulo(-1)">Anterior</button>
        <button class="nav-btn" id="nextBtn" onclick="mudarCapitulo(1)">Próximo</button>
    </nav>

    <div class="settings-panel" id="settings">
        <div style="display:flex; gap: 5px; flex-direction: column;">
            <p style="font-size: 0.6rem; font-weight: 800; opacity: 0.5; margin-bottom: 5px;">FONTE</p>
            <button class="btn-icon" style="text-align: left; padding: 8px 0;" onclick="changeFont('Merriweather', 'serif')">Merriweather (Serif)</button>
            <button class="btn-icon" style="text-align: left; padding: 8px 0;" onclick="changeFont('Inter', 'sans-serif')">Inter (Modern)</button>
        </div>
        <hr style="opacity: 0.1">
        <div style="display:flex; gap: 5px; flex-direction: column;">
            <p style="font-size: 0.6rem; font-weight: 800; opacity: 0.5; margin-bottom: 5px;">TAMANHO</p>
            <div style="display:flex; gap: 10px;">
                <button class="nav-btn" style="padding: 10px;" onclick="adjustSize(-0.1)">A-</button>
                <button class="nav-btn" style="padding: 10px;" onclick="adjustSize(0.1)">A+</button>
            </div>
        </div>
        <hr style="opacity: 0.1">
        <div style="display:flex; gap: 5px; flex-direction: column;">
            <p style="font-size: 0.6rem; font-weight: 800; opacity: 0.5; margin-bottom: 5px;">TEMA</p>
            <div style="display:flex; gap: 10px; justify-content: space-between;">
                <div onclick="setTheme('dark')" style="width: 30px; height: 30px; background: #0a0a0a; border-radius: 50%; border: 1px solid #333; cursor: pointer;"></div>
                <div onclick="setTheme('sepia')" style="width: 30px; height: 30px; background: #f4ecd8; border-radius: 50%; border: 1px solid #333; cursor: pointer;"></div>
                <div onclick="setTheme('light')" style="width: 30px; height: 30px; background: #ffffff; border-radius: 50%; border: 1px solid #333; cursor: pointer;"></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc, collection, query, orderBy, getDocs, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAt_l4DcDiXrCRzDkOtu8PeWoIwMk9Mj38",
            authDomain: "litz-orignals.firebaseapp.com",
            projectId: "litz-orignals",
            storageBucket: "litz-orignals.firebasestorage.app",
            messagingSenderId: "286693298991",
            appId: "1:286693298991:web:a139c4637b86a4725a87da"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        const urlParams = new URLSearchParams(window.location.search);
        let bookId = urlParams.get('id');
        let tempId = urlParams.get('temp');
        let epId = urlParams.get('ep');
        
        let userUID = null;
        let episodiosOrdenados = [];

        // --- CARREGAR CONTEÚDO ---
        async function carregarCapitulo() {
            if (!bookId || !tempId || !epId) return;

            const epRef = doc(db, "livros", bookId, "temporadas", tempId, "episodios", epId);
            const snap = await getDoc(epRef);

            if (snap.exists()) {
                const data = snap.data();
                document.getElementById('displayTitle').innerText = data.titulo.toUpperCase();
                
                // Melhora a formatação de parágrafos (lida com múltiplas quebras de linha)
                const paragrafos = data.conteudo.split(/\n+/);
                const formatado = paragrafos.map(p => p.trim() ? `<p>${p}</p>` : '').join('');
                document.getElementById('content-area').innerHTML = formatado;
                
                window.scrollTo(0, 0);
                atualizarNavegacao();
                
                // Tenta salvar o histórico se o usuário já estiver logado
                if(userUID) salvarHistorico();
            }
        }

        // --- NAVEGAÇÃO ENTRE CAPÍTULOS ---
        async function atualizarNavegacao() {
            const epsRef = collection(db, "livros", bookId, "temporadas", tempId, "episodios");
            const q = query(epsRef, orderBy("ordem", "asc"));
            const snap = await getDocs(q);
            
            episodiosOrdenados = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            
            const index = episodiosOrdenados.findIndex(e => e.id === epId);
            document.getElementById('prevBtn').disabled = (index <= 0);
            document.getElementById('nextBtn').disabled = (index >= episodiosOrdenados.length - 1);
        }

        window.mudarCapitulo = (direcao) => {
            const index = episodiosOrdenados.findIndex(e => e.id === epId);
            const novoIndex = index + direcao;
            
            if (novoIndex >= 0 && novoIndex < episodiosOrdenados.length) {
                const novoEp = episodiosOrdenados[novoIndex];
                // Atualiza a URL e recarrega para mudar o capítulo
                window.location.href = `ler.html?id=${bookId}&temp=${tempId}&ep=${novoEp.id}`;
            }
        };

        // --- SALVAR HISTÓRICO ---
        async function salvarHistorico() {
            if (!userUID || !bookId) return;
            const histRef = doc(db, "users", userUID, "historico", bookId);
            try {
                await setDoc(histRef, {
                    tempId: tempId,
                    epId: epId,
                    data: serverTimestamp()
                }, { merge: true });
            } catch(e) { console.error("Erro ao salvar histórico", e); }
        }

        // --- INTERFACE E AJUSTES ---
        let lastScroll = 0;
        window.onscroll = () => {
            const winScroll = document.documentElement.scrollTop;
            const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            const scrolled = (winScroll / height) * 100;
            document.getElementById("progressBar").style.width = scrolled + "%";

            // Esconde o header ao rolar para baixo, mostra ao rolar para cima
            if (winScroll > lastScroll && winScroll > 100) {
                document.getElementById('header').classList.add('hide');
                document.getElementById('settings').classList.remove('active');
            } else {
                document.getElementById('header').classList.remove('hide');
            }
            lastScroll = winScroll;
        };

        window.toggleSettings = () => document.getElementById('settings').classList.toggle('active');

        window.changeFont = (f, type) => {
            document.documentElement.style.setProperty('--font-family', `${f}, ${type}`);
            localStorage.setItem('litz-font', f);
        };
        
        window.adjustSize = (val) => {
            const current = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--font-size'));
            const novoTamanho = Math.max(0.8, Math.min(2.0, current + val));
            document.documentElement.style.setProperty('--font-size', novoTamanho + "rem");
            localStorage.setItem('litz-font-size', novoTamanho);
        };

        window.setTheme = (t) => {
            document.body.className = t;
            localStorage.setItem('litz-theme', t);
        };

        // --- INICIALIZAÇÃO ---
        onAuthStateChanged(auth, (user) => {
            if (user) {
                userUID = user.uid;
                salvarHistorico(); // Salva se o capítulo já carregou
            }
            carregarCapitulo();
        });

        // Carregar preferências salvas
        const savedTheme = localStorage.getItem('litz-theme');
        if (savedTheme) setTheme(savedTheme);

        const savedFont = localStorage.getItem('litz-font');
        if (savedFont) changeFont(savedFont, savedFont === 'Inter' ? 'sans-serif' : 'serif');

        const savedSize = localStorage.getItem('litz-font-size');
        if (savedSize) document.documentElement.style.setProperty('--font-size', savedSize + "rem");

    </script>
</body>
</html>
