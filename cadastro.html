<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Litz — Criar Conta</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #121212;
            --card-bg: rgba(30, 30, 30, 0.7);
            --text-main: #EAEAEA;
            --text-dim: #A0A0A0;
            --primary-green: #3DDC97;
            --accent-purple: #7B2CBF;
            --accent-purple-hover: #9D4EDD;
            --error-red: #FF4D4D;
            --border-color: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        .blur-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 1;
            filter: blur(100px);
            opacity: 0.4;
            background: radial-gradient(circle at 20% 30%, #7B2CBF 0%, transparent 40%), 
                        radial-gradient(circle at 80% 70%, #3DDC97 0%, transparent 40%);
        }

        .auth-container {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 420px;
            padding: 40px;
            background: var(--card-bg);
            backdrop-filter: blur(25px);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            animation: modalPop 0.6s cubic-bezier(0.17, 0.67, 0.83, 0.67);
        }

        @keyframes modalPop {
            0% { opacity: 0; transform: scale(0.9) translateY(20px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        .auth-header h1 { font-size: 1.6rem; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 8px; }
        .auth-header p { font-size: 0.85rem; color: var(--text-dim); margin-bottom: 25px; }

        .input-group { text-align: left; margin-bottom: 18px; position: relative; }
        .input-group label { display: block; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; color: var(--text-dim); }
        
        .input-group input {
            width: 100%;
            padding: 14px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-main);
            font-size: 0.95rem;
            transition: 0.3s;
        }

        .input-group input:focus { border-color: var(--accent-purple); background: rgba(255, 255, 255, 0.07); }

        /* CHECKBOX CUSTOM */
        .terms-group {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin-bottom: 25px;
            text-align: left;
            cursor: pointer;
        }

        .terms-group input { cursor: pointer; margin-top: 3px; accent-color: var(--primary-green); }
        .terms-group label { font-size: 0.8rem; color: var(--text-dim); line-height: 1.4; cursor: pointer; }
        .terms-group span { color: var(--primary-green); text-decoration: underline; }

        .btn-auth {
            width: 100%;
            padding: 16px;
            background: var(--accent-purple);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-auth:hover { background: var(--accent-purple-hover); transform: translateY(-2px); box-shadow: 0 5px 15px rgba(123, 44, 191, 0.3); }
        .btn-auth:disabled { background: #444; cursor: not-allowed; transform: none; }

        /* TOAST NOTIFICATION */
        .toast {
            position: fixed;
            top: 20px;
            right: -300px;
            padding: 15px 25px;
            border-radius: 8px;
            color: white;
            font-size: 0.9rem;
            font-weight: 600;
            z-index: 1000;
            transition: 0.5s cubic-bezier(0.68, -0.55, 0.26, 1.55);
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .toast.show { right: 20px; }
        .toast.success { background: var(--primary-green); color: #121212; }
        .toast.error { background: var(--error-red); }

        .copyright { position: absolute; bottom: 20px; font-size: 0.6rem; letter-spacing: 1px; color: #444; text-transform: uppercase; }

    </style>
</head>
<body>

    <div class="blur-bg"></div>

    <div id="toast" class="toast"></div>

    <div class="auth-container">
        <div class="auth-header">
            <h1>Criar Conta</h1>
            <p>Sua jornada literária começa aqui</p>
        </div>

        <form id="registerForm">
            <div class="input-group">
                <label>Nome Completo</label>
                <input type="text" id="name" required placeholder="Ex: Machado de Assis">
            </div>

            <div class="input-group">
                <label>E-mail</label>
                <input type="email" id="email" required placeholder="seu@email.com">
            </div>

            <div class="input-group">
                <label>Senha</label>
                <input type="password" id="password" required placeholder="Mínimo 6 caracteres">
            </div>

            <div class="input-group">
                <label>Confirmar Senha</label>
                <input type="password" id="confirmPassword" required placeholder="Repita a senha">
            </div>

            <div class="terms-group">
                <input type="checkbox" id="termsCheck" required>
                <label for="termsCheck">Li e concordo com os <span>Termos de Uso</span> e <span>Política de Privacidade</span> do Litz.</label>
            </div>

            <button type="submit" id="btnSubmit" class="btn-auth">Cadastrar</button>
        </form>

        <div style="margin-top: 20px; font-size: 0.8rem; color: var(--text-dim);">
            Já possui conta? <a href="login.html" style="color: var(--primary-green); text-decoration: none;">Entrar agora</a>
        </div>
    </div>

    <div class="copyright">© 2026 LITZ — TODOS OS DIREITOS RESERVADOS.</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, updateProfile } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // COLOQUE SUAS CREDENCIAIS DO FIREBASE AQUI:
        const firebaseConfig = {
            apiKey: "AIzaSyAt_l4DcDiXrCRzDkOtu8PeWoIwMk9Mj38",
            authDomain: "litz-orignals.firebaseapp.com",
            projectId: "litz-orignals",
            storageBucket: "litz-orignals.firebasestorage.app",
            messagingSenderId: "286693298991",
            appId: "1:286693298991:web:a139c4637b86a4725a87da"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const form = document.getElementById('registerForm');
        const btnSubmit = document.getElementById('btnSubmit');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirmPassword').value;

            // Validações locais
            if (password !== confirm) {
                showToast("As senhas não coincidem!", "error");
                return;
            }

            if (password.length < 6) {
                showToast("A senha deve ter pelo menos 6 caracteres.", "error");
                return;
            }

            btnSubmit.disabled = true;
            btnSubmit.innerText = "Processando...";

            try {
                // 1. Criar usuário no Firebase Auth
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                // 2. Atualizar nome no perfil do Auth
                await updateProfile(user, { displayName: name });

                // 3. Salvar dados extras no Firestore (Coleção 'users')
                await setDoc(doc(db, "users", user.uid), {
                    uid: user.uid,
                    nome: name,
                    email: email,
                    role: "reader", // Padrão é leitor
                    favoritos: [],
                    createdAt: new Date()
                });

                showToast("Conta criada com sucesso! Bem-vindo.", "success");
                
                setTimeout(() => {
                    window.location.href = "home.html";
                }, 2000);

            } catch (error) {
                console.error(error);
                let msg = "Erro ao cadastrar. Tente novamente.";
                if (error.code === 'auth/email-already-in-use') msg = "Este e-mail já está em uso.";
                showToast(msg, "error");
                btnSubmit.disabled = false;
                btnSubmit.innerText = "Cadastrar";
            }
        });

        function showToast(text, type) {
            const toast = document.getElementById('toast');
            toast.innerText = text;
            toast.className = `toast show ${type}`;
            setTimeout(() => {
                toast.className = 'toast';
            }, 3000);
        }
    </script>
</body>
</html>
