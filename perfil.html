<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Litz — Meu Perfil</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --surface: #121212;
            --accent: #7B2CBF;
            --green: #3DDC97;
            --text: #ffffff;
            --text-dim: #a0a0a0;
            --border: rgba(255,255,255,0.08);
        }

        * { margin:0; padding:0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

        /* --- HEADER --- */
        .profile-header {
            padding: 30px 5%; display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid var(--border);
        }
        .btn-back { color: var(--text-dim); text-decoration: none; font-size: 0.9rem; font-weight: 600; cursor: pointer; }

        /* --- USER CARD --- */
        .user-section { padding: 40px 5%; display: flex; align-items: center; gap: 20px; }
        .user-avatar { width: 90px; height: 90px; border-radius: 20px; object-fit: cover; border: 2px solid var(--accent); background: #222; }
        .user-info h2 { font-size: 1.8rem; font-weight: 800; letter-spacing: -1px; }
        .user-info p { color: var(--text-dim); font-size: 0.9rem; }

        /* --- TABS --- */
        .tabs { display: flex; gap: 30px; padding: 0 5%; border-bottom: 1px solid var(--border); overflow-x: auto; }
        .tab-btn {
            padding: 15px 0; cursor: pointer; color: var(--text-dim); font-weight: 700;
            font-size: 0.85rem; text-transform: uppercase; position: relative; white-space: nowrap;
        }
        .tab-btn.active { color: var(--green); }
        .tab-btn.active::after {
            content: ''; position: absolute; bottom: -1px; left: 0; width: 100%; height: 2px; background: var(--green);
        }

        /* --- CONTENT AREAS --- */
        .tab-content { padding: 30px 5%; display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Grid de Livros */
        .book-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 15px; }
        .book-item { cursor: pointer; transition: 0.3s; }
        .book-item:hover { transform: translateY(-5px); }
        .book-thumb { width: 100%; aspect-ratio: 2/3; border-radius: 8px; object-fit: cover; background: #1a1a1a; border: 1px solid var(--border); }
        .book-name { font-size: 0.8rem; font-weight: 600; margin-top: 8px; display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        /* Mensagens / Correio */
        .msg-card { background: var(--surface); border: 1px solid var(--border); padding: 20px; border-radius: 12px; margin-bottom: 15px; }
        .msg-tag { font-size: 0.65rem; font-weight: 800; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; }
        .msg-text { font-size: 0.9rem; margin: 10px 0; line-height: 1.6; color: #ddd; }
        .msg-date { font-size: 0.7rem; color: var(--text-dim); }

        /* Suporte */
        .support-form { max-width: 500px; display: grid; gap: 15px; }
        .support-form input, .support-form textarea {
            background: var(--surface); border: 1px solid var(--border);
            padding: 15px; color: #fff; border-radius: 8px; font-family: inherit; font-size: 0.95rem;
        }
        .support-form input:focus, .support-form textarea:focus { outline: 1px solid var(--accent); }
        .btn-send { background: var(--green); color: #000; border: none; padding: 15px; border-radius: 8px; font-weight: 800; cursor: pointer; text-transform: uppercase; transition: 0.2s; }
        .btn-send:hover { opacity: 0.9; transform: scale(0.98); }

        .logout-btn { color: #ff4d4d; border: 1px solid #ff4d4d; background: none; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-size: 0.8rem; font-weight: 700; }
    </style>
</head>
<body>

    <header class="profile-header">
        <a href="home.html" class="btn-back">← Início</a>
        <button class="logout-btn" onclick="fazerLogout()">Sair da Conta</button>
    </header>

    <section class="user-section">
        <img src="https://via.placeholder.com/90" class="user-avatar" id="uAvatar">
        <div class="user-info">
            <h2 id="uName">Carregando...</h2>
            <p id="uEmail">Aguarde um momento</p>
        </div>
    </section>

    <nav class="tabs">
        <div class="tab-btn active" onclick="openTab(event, 'salvos')">Meus Livros</div>
        <div class="tab-btn" onclick="openTab(event, 'historico')">Histórico</div>
        <div class="tab-btn" onclick="openTab(event, 'correio')">Correio</div>
        <div class="tab-btn" onclick="openTab(event, 'contato')">Falar com Litz</div>
    </nav>

    <div id="salvos" class="tab-content active">
        <div class="book-grid" id="gridSalvos"></div>
    </div>

    <div id="historico" class="tab-content">
        <div class="book-grid" id="gridHistory"></div>
    </div>

    <div id="correio" class="tab-content">
        <div id="listMensagens">
            <p style="color:var(--text-dim); text-align: center; margin-top: 20px;">Nenhuma mensagem no momento.</p>
        </div>
    </div>

    <div id="contato" class="tab-content">
        <form class="support-form" id="formSuporte">
            <input type="text" id="supAssunto" placeholder="Sobre o que quer falar?" required>
            <textarea id="supMsg" rows="5" placeholder="Sua sugestão, erro ou dúvida..." required></textarea>
            <button type="submit" class="btn-send" id="btnSup">Enviar Mensagem</button>
        </form>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc, collection, query, where, getDocs, addDoc, serverTimestamp, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAt_l4DcDiXrCRzDkOtu8PeWoIwMk9Mj38",
            authDomain: "litz-orignals.firebaseapp.com",
            projectId: "litz-orignals",
            storageBucket: "litz-orignals.firebasestorage.app",
            messagingSenderId: "286693298991",
            appId: "1:286693298991:web:a139c4637b86a4725a87da"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let userUID = null;

        // --- CONTROLE DE SESSÃO ---
        onAuthStateChanged(auth, (user) => {
            if (user) {
                userUID = user.uid;
                
                // Monitorar Perfil em Tempo Real
                monitorarPerfil(user);

                // Iniciar carregamento em Tempo Real
                monitorarBiblioteca();
                monitorarHistorico();
                monitorarMensagens();
            } else {
                window.location.href = "login.html";
            }
        });

        // --- 1. MONITORAR DADOS DO USUÁRIO ---
        function monitorarPerfil(userAuth) {
            const userRef = doc(db, "users", userUID);
            onSnapshot(userRef, (snap) => {
                document.getElementById('uName').innerText = userAuth.displayName || "Usuário Litz";
                document.getElementById('uEmail').innerText = userAuth.email;
                
                if(snap.exists() && snap.data().foto) {
                    document.getElementById('uAvatar').src = snap.data().foto;
                } else if(userAuth.photoURL) {
                    document.getElementById('uAvatar').src = userAuth.photoURL;
                }
            });
        }

        // --- 2. BIBLIOTECA EM TEMPO REAL ---
        function monitorarBiblioteca() {
            const grid = document.getElementById('gridSalvos');
            const biblioRef = collection(db, "users", userUID, "biblioteca");

            onSnapshot(biblioRef, async (snap) => {
                if(snap.empty) {
                    grid.innerHTML = "<p style='color:var(--text-dim)'>Nada salvo ainda.</p>";
                    return;
                }

                // Carregar detalhes de todos os livros favoritados em paralelo (mais rápido)
                const bookPromises = snap.docs.map(d => getDoc(doc(db, "livros", d.id)));
                const bookSnaps = await Promise.all(bookPromises);

                grid.innerHTML = "";
                bookSnaps.forEach(bookSnap => {
                    if(bookSnap.exists()){
                        const b = bookSnap.data();
                        grid.innerHTML += renderBook(bookSnap.id, b.capa, b.titulo);
                    }
                });
            });
        }

        // --- 3. HISTÓRICO EM TEMPO REAL ---
        function monitorarHistorico() {
            const grid = document.getElementById('gridHistory');
            const histRef = query(collection(db, "users", userUID, "historico"), orderBy("data", "desc"));

            onSnapshot(histRef, async (snap) => {
                if(snap.empty) {
                    grid.innerHTML = "<p style='color:var(--text-dim)'>Você ainda não começou a ler.</p>";
                    return;
                }

                const bookPromises = snap.docs.map(d => getDoc(doc(db, "livros", d.id)));
                const bookSnaps = await Promise.all(bookPromises);

                grid.innerHTML = "";
                bookSnaps.forEach(bookSnap => {
                    if(bookSnap.exists()){
                        const b = bookSnap.data();
                        grid.innerHTML += renderBook(bookSnap.id, b.capa, b.titulo);
                    }
                });
            });
        }

        // --- 4. CORREIO EM TEMPO REAL ---
        function monitorarMensagens() {
            const container = document.getElementById('listMensagens');
            const msgRef = query(collection(db, "users", userUID, "mensagens"), orderBy("data", "desc"));

            onSnapshot(msgRef, (snap) => {
                if(snap.empty) {
                    container.innerHTML = `<p style="color:var(--text-dim); text-align: center; margin-top: 20px;">Nenhuma mensagem no momento.</p>`;
                    return;
                }

                container.innerHTML = "";
                snap.forEach(msgDoc => {
                    const m = msgDoc.data();
                    const dataFormatada = m.data?.toDate().toLocaleDateString('pt-BR') || "Recentemente";
                    container.innerHTML += `
                        <div class="msg-card">
                            <span class="msg-tag">${m.tag || 'EQUIPE LITZ'}</span>
                            <p class="msg-text">${m.texto}</p>
                            <span class="msg-date">${dataFormatada}</span>
                        </div>
                    `;
                });
            });
        }

        // --- AUXILIARES ---
        function renderBook(id, capa, titulo) {
            return `
                <div class="book-item" onclick="location.href='livro.html?id=${id}'">
                    <img src="${capa}" class="book-thumb" loading="lazy">
                    <span class="book-name">${titulo}</span>
                </div>
            `;
        }

        window.openTab = (e, id) => {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            e.currentTarget.classList.add('active');
            document.getElementById(id).classList.add('active');
        };

        // --- SUPORTE ---
        document.getElementById('formSuporte').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnSup');
            btn.innerText = "Enviando...";
            btn.disabled = true;

            try {
                await addDoc(collection(db, "suporte"), {
                    userId: userUID,
                    userName: auth.currentUser.displayName || "Anônimo",
                    assunto: document.getElementById('supAssunto').value,
                    mensagem: document.getElementById('supMsg').value,
                    data: serverTimestamp()
                });
                alert("Sua mensagem foi entregue ao Litz!");
                e.target.reset();
            } catch (err) {
                alert("Erro ao enviar. Tente novamente.");
            } finally {
                btn.innerText = "Enviar Mensagem";
                btn.disabled = false;
            }
        };

        window.fazerLogout = () => {
            if(confirm("Deseja realmente sair?")) {
                signOut(auth).then(() => window.location.href = "login.html");
            }
        };
    </script>
</body>
</html>
